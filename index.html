<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Tabungan Qurban MIS 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }

      .app {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px;
      }

      .header {
        background: linear-gradient(135deg, #15803d, #22c55e);
        color: white;
        padding: 26px;
        border-radius: 22px;
        box-shadow: 0 12px 30px rgba(21, 128, 61, 0.22);
        margin-bottom: 22px;
      }

      .header h1 {
        margin: 0;
        font-size: 28px;
      }

      .header p {
        margin: 8px 0 0;
        opacity: 0.95;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 18px;
      }

      .summary-card {
        background: #ffffff;
        border-radius: 18px;
        padding: 18px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
      }

      .summary-card .label {
        font-size: 13px;
        color: #64748b;
        font-weight: 800;
        margin-bottom: 6px;
      }

      .summary-card .value {
        font-size: 22px;
        font-weight: 900;
        color: #14532d;
      }

      .menu {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 18px;
      }

      .menu button {
        border: 0;
        padding: 15px;
        border-radius: 14px;
        background: #ffffff;
        color: #334155;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      }

      .menu button.active {
        background: #16a34a;
        color: #ffffff;
      }

      .grid {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 18px;
        align-items: start;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 20px;
        color: #14532d;
      }

      .section {
        display: none;
      }

      .section.active {
        display: block;
      }

      label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 800;
        color: #334155;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 13px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        background: #ffffff;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: #16a34a;
        box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
      }

      textarea {
        resize: vertical;
      }

      .submit-btn {
        width: 100%;
        margin-top: 18px;
        padding: 14px;
        border: 0;
        border-radius: 12px;
        background: #16a34a;
        color: #ffffff;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
      }

      .submit-btn:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .message {
        display: none;
        margin-bottom: 18px;
        padding: 13px;
        border-radius: 12px;
        font-weight: 800;
        text-align: center;
      }

      .message.success {
        display: block;
        background: #dcfce7;
        color: #166534;
      }

      .message.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
      }

      .list-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .list-head h2 {
        margin: 0;
        font-size: 20px;
        color: #14532d;
      }

      .small-btn {
        border: 0;
        background: #e2e8f0;
        color: #334155;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 800;
        cursor: pointer;
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: 14px;
        border: 1px solid #e2e8f0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 650px;
        background: #ffffff;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #e2e8f0;
        text-align: left;
        font-size: 14px;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
        color: #475569;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .empty {
        padding: 24px;
        text-align: center;
        color: #64748b;
        background: #f8fafc;
        border-radius: 14px;
        border: 1px dashed #cbd5e1;
      }

      .amount {
        font-weight: 900;
        color: #15803d;
        white-space: nowrap;
      }

      .muted {
        color: #64748b;
        font-size: 13px;
      }

      @media (max-width: 820px) {
        .app {
          padding: 16px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 23px;
        }

        .menu,
        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <h1>Tabungan Qurban MIS 2026</h1>
        <p>
          Input donatur dan transaksi tabungan qurban menggunakan Google Sheets.
        </p>
      </div>

      <div class="summary">
        <div class="summary-card">
          <div class="label">Jumlah Donatur</div>
          <div class="value" id="summaryDonatur">0</div>
        </div>

        <div class="summary-card">
          <div class="label">Jumlah Transaksi</div>
          <div class="value" id="summaryTransaksi">0</div>
        </div>

        <div class="summary-card">
          <div class="label">Total Tabungan</div>
          <div class="value" id="summaryTotal">Rp0</div>
        </div>
      </div>

      <div id="messageBox" class="message"></div>

      <div class="menu">
        <button
          type="button"
          id="btnDonatur"
          class="active"
          onclick="showSection('donatur')"
        >
          Insert Donatur
        </button>

        <button
          type="button"
          id="btnTransaksi"
          onclick="showSection('transaksi')"
        >
          Insert Transaksi
        </button>
      </div>

      <div id="sectionDonatur" class="section active">
        <div class="grid">
          <div class="card">
            <h2>Form Donatur</h2>

            <form id="formDonatur">
              <label>Nama Donatur</label>
              <input
                type="text"
                id="namaDonatur"
                placeholder="Contoh: Ahmad Bin Ali"
                required
              />

              <label>No HP</label>
              <input
                type="text"
                id="nohpDonatur"
                placeholder="Contoh: 08123456789"
                required
              />

              <label>Alamat</label>
              <textarea
                id="alamatDonatur"
                rows="4"
                placeholder="Alamat donatur"
                required
              ></textarea>

              <button type="submit" class="submit-btn" id="submitDonatur">
                Simpan Donatur
              </button>
            </form>
          </div>

          <div class="card">
            <div class="list-head">
              <h2>List Donatur</h2>
              <button type="button" class="small-btn" onclick="loadData()">
                Refresh
              </button>
            </div>

            <div id="donaturList">
              <div class="empty">Memuat data donatur...</div>
            </div>
          </div>
        </div>
      </div>

      <div id="sectionTransaksi" class="section">
        <div class="grid">
          <div class="card">
            <h2>Form Transaksi</h2>

            <form id="formTransaksi">
              <label>Pilih Donatur</label>
              <select id="donaturSelect" required>
                <option value="">Memuat data donatur...</option>
              </select>

              <label>Jumlah Tabungan</label>
              <input
                type="number"
                id="jumlahTransaksi"
                placeholder="Contoh: 100000"
                required
              />

              <label>Catatan</label>
              <textarea
                id="catatanTransaksi"
                rows="4"
                placeholder="Contoh: Tabungan minggu pertama"
              ></textarea>

              <button type="submit" class="submit-btn" id="submitTransaksi">
                Simpan Transaksi
              </button>
            </form>
          </div>

          <div class="card">
            <div class="list-head">
              <h2>Log Transaksi</h2>
              <button type="button" class="small-btn" onclick="loadData()">
                Refresh
              </button>
            </div>

            <div id="transaksiList">
              <div class="empty">Memuat log transaksi...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbwRzmMdjIGzTIJFkUhGOtZOsu2IlIQSaYreWv8SPmvtDiwOuZjRaQ5OrOgQ_aWbwTU/exec";

      let donaturData = [];
      let transaksiData = [];

      function showSection(type) {
        document.getElementById("sectionDonatur").classList.remove("active");
        document.getElementById("sectionTransaksi").classList.remove("active");

        document.getElementById("btnDonatur").classList.remove("active");
        document.getElementById("btnTransaksi").classList.remove("active");

        if (type === "donatur") {
          document.getElementById("sectionDonatur").classList.add("active");
          document.getElementById("btnDonatur").classList.add("active");
        }

        if (type === "transaksi") {
          document.getElementById("sectionTransaksi").classList.add("active");
          document.getElementById("btnTransaksi").classList.add("active");
        }
      }

      function loadData() {
        const oldScript = document.getElementById("sheetJsonpScript");

        if (oldScript) {
          oldScript.remove();
        }

        const script = document.createElement("script");
        script.id = "sheetJsonpScript";
        script.src =
          SCRIPT_URL + "?callback=handleSheetData&t=" + new Date().getTime();

        document.body.appendChild(script);
      }

      function handleSheetData(result) {
        console.log("DATA DARI GOOGLE SHEETS:", result);

        if (result.status === "error") {
          showMessage(result.message || "Gagal membaca data.", "error");
          return;
        }

        donaturData = result.donatur || [];
        transaksiData = result.transaksi || [];

        renderSummary();
        renderDonaturDropdown();
        renderDonaturList();
        renderTransaksiList();
      }

      function renderSummary() {
        const totalSemua = transaksiData.reduce((total, transaksi) => {
          return total + cleanNumber(transaksi.jumlah);
        }, 0);

        document.getElementById("summaryDonatur").innerText =
          donaturData.length;
        document.getElementById("summaryTransaksi").innerText =
          transaksiData.length;
        document.getElementById("summaryTotal").innerText =
          formatRupiah(totalSemua);
      }

      function renderDonaturDropdown() {
        const select = document.getElementById("donaturSelect");

        if (!donaturData.length) {
          select.innerHTML = `<option value="">Belum ada donatur</option>`;
          return;
        }

        select.innerHTML = `<option value="">-- Pilih Donatur --</option>`;

        donaturData.forEach((item, index) => {
          const totalTabungan = getTotalTabunganByDonatur(item);

          select.innerHTML += `
          <option value="${index}">
            ${escapeHtml(item.nama)} - ${formatRupiah(totalTabungan)}
          </option>
        `;
        });
      }

      function renderDonaturList() {
        const wrapper = document.getElementById("donaturList");

        if (!donaturData.length) {
          wrapper.innerHTML = `<div class="empty">Belum ada data donatur.</div>`;
          return;
        }

        let html = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>No HP</th>
                <th>Alamat</th>
                <th>Total Tabungan</th>
              </tr>
            </thead>
            <tbody>
      `;

        donaturData.forEach((item, index) => {
          const totalTabungan = getTotalTabunganByDonatur(item);

          html += `
          <tr>
            <td>${index + 1}</td>
            <td>
              <strong>${escapeHtml(item.nama)}</strong>
              <div class="muted">${escapeHtml(item.tanggal)}</div>
            </td>
            <td>${escapeHtml(item.nohp)}</td>
            <td>${escapeHtml(item.alamat)}</td>
            <td class="amount">${formatRupiah(totalTabungan)}</td>
          </tr>
        `;
        });

        html += `
            </tbody>
          </table>
        </div>
      `;

        wrapper.innerHTML = html;
      }

      function renderTransaksiList() {
        const wrapper = document.getElementById("transaksiList");

        if (!transaksiData.length) {
          wrapper.innerHTML = `<div class="empty">Belum ada log transaksi.</div>`;
          return;
        }

        let html = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Donatur</th>
                <th>Jumlah</th>
                <th>Catatan</th>
              </tr>
            </thead>
            <tbody>
      `;

        transaksiData
          .slice()
          .reverse()
          .forEach((item, index) => {
            html += `
          <tr>
            <td>${index + 1}</td>
            <td>${escapeHtml(item.tanggal)}</td>
            <td>
              <strong>${escapeHtml(item.nama)}</strong>
              <div class="muted">${escapeHtml(item.nohp)}</div>
            </td>
            <td class="amount">${formatRupiah(item.jumlah)}</td>
            <td>${escapeHtml(item.catatan)}</td>
          </tr>
        `;
          });

        html += `
            </tbody>
          </table>
        </div>
      `;

        wrapper.innerHTML = html;
      }

      function getTotalTabunganByDonatur(donatur) {
        return transaksiData
          .filter((transaksi) => {
            return (
              normalizePhone(transaksi.nohp) === normalizePhone(donatur.nohp)
            );
          })
          .reduce((total, transaksi) => {
            return total + cleanNumber(transaksi.jumlah);
          }, 0);
      }

      function normalizePhone(value) {
        return String(value || "")
          .replace(/\D/g, "")
          .trim();
      }

      function cleanNumber(value) {
        return Number(String(value || "0").replace(/[^\d]/g, "")) || 0;
      }

      document
        .getElementById("formDonatur")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const button = document.getElementById("submitDonatur");
          button.disabled = true;
          button.innerText = "Menyimpan...";

          const data = {
            type: "donatur",
            nama: document.getElementById("namaDonatur").value.trim(),
            nohp: document.getElementById("nohpDonatur").value.trim(),
            alamat: document.getElementById("alamatDonatur").value.trim(),
          };

          await submitToSheet(data, "Data donatur berhasil disimpan.");

          button.disabled = false;
          button.innerText = "Simpan Donatur";
        });

      document
        .getElementById("formTransaksi")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const selectedIndex = document.getElementById("donaturSelect").value;

          if (selectedIndex === "") {
            showMessage("Silakan pilih donatur dahulu.", "error");
            return;
          }

          const selectedDonatur = donaturData[selectedIndex];

          const button = document.getElementById("submitTransaksi");
          button.disabled = true;
          button.innerText = "Menyimpan...";

          const data = {
            type: "transaksi",
            nama: selectedDonatur.nama,
            nohp: selectedDonatur.nohp,
            jumlah: document.getElementById("jumlahTransaksi").value,
            catatan: document.getElementById("catatanTransaksi").value.trim(),
          };

          await submitToSheet(data, "Data transaksi berhasil disimpan.");

          button.disabled = false;
          button.innerText = "Simpan Transaksi";
        });

      function submitToSheet(data, successMessage) {
        return new Promise((resolve) => {
          const callbackName = "insertCallback_" + new Date().getTime();

          window[callbackName] = function (result) {
            if (result && result.status === "success") {
              showMessage(successMessage, "success");

              if (data.type === "donatur") {
                document.getElementById("formDonatur").reset();
              }

              if (data.type === "transaksi") {
                document.getElementById("formTransaksi").reset();
              }

              setTimeout(() => {
                loadData();
              }, 700);
            } else {
              showMessage(
                (result && result.message) || "Gagal menyimpan data.",
                "error",
              );
            }

            delete window[callbackName];

            const oldScript = document.getElementById(callbackName);
            if (oldScript) {
              oldScript.remove();
            }

            resolve(result);
          };

          let url = SCRIPT_URL + "?callback=" + callbackName;

          if (data.type === "donatur") {
            url += "&action=insertDonatur";
            url += "&nama=" + encodeURIComponent(data.nama);
            url += "&nohp=" + encodeURIComponent(data.nohp);
            url += "&alamat=" + encodeURIComponent(data.alamat);
          }

          if (data.type === "transaksi") {
            url += "&action=insertTransaksi";
            url += "&nama=" + encodeURIComponent(data.nama);
            url += "&nohp=" + encodeURIComponent(data.nohp);
            url += "&jumlah=" + encodeURIComponent(data.jumlah);
            url += "&catatan=" + encodeURIComponent(data.catatan);
          }

          console.log("INSERT URL:", url);

          const script = document.createElement("script");
          script.id = callbackName;
          script.src = url;

          document.body.appendChild(script);
        });
      }

      function showMessage(text, type) {
        const messageBox = document.getElementById("messageBox");

        messageBox.innerText = text;
        messageBox.className = "message " + type;

        setTimeout(() => {
          messageBox.className = "message";
          messageBox.innerText = "";
        }, 3500);
      }

      function formatRupiah(value) {
        const number = cleanNumber(value);

        return new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          maximumFractionDigits: 0,
        }).format(number);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      loadData();
    </script>
  </body>
</html>
